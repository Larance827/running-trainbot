name: 🏃 TrainBot Daily Push

on:
  schedule:
    # 每天北京时间 08:00 = UTC 00:00
    # NOTE: 新 workflow 首次 push 后需额外一次 commit 激活 schedule
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发测试

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24 适配 (2026/6/16 强制)

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Push tomorrow's training to WeChat
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python scripts/trainbot_notify.py
